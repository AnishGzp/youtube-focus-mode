<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube Focus Mode</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="padding">
      <div class="header_container">
        <div class="header_container_left">
          <h3>YT Focus Mode</h3>
          <p>Stay focused. Remove distractions.</p>
        </div>
        <div class="header_container_right">
          <div class="header_container_right_svg_container"></div>
          <div class="header_container_right_toggle_container">
            <input
              type="checkbox"
              name="mainToggle"
              id="mainToggle"
              class="toggleInput"
            />
            <label for="mainToggle" class="toggle"></label>
          </div>
        </div>
      </div>
      <div class="header_footer">
        <span class="small_circle"></span>
        <p>Active — filtering YouTube</p>
      </div>
    </header>

    <script type="module" src="./ui/popup.js"></script>
  </body>
</html>
